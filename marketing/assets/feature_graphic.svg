      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#131a2e"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg2)"/>
  <!-- Glow -->
  <circle cx="820" cy="250" r="220" fill="#4f8cff" opacity="0.15"/>
