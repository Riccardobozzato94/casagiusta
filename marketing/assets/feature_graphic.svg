  <!-- Text right -->
  <text x="400" y="200" font-family="-apple-system, sans-serif" font-size="76" font-weight="900" fill="#e8edf7">CasaGiusta</text>
  <text x="400" y="260" font-family="-apple-system, sans-serif" font-size="34" font-weight="600" fill="#8b97b3">La tua casa, i tuoi diritti</text>
  <text x="400" y="330" font-family="-apple-system, sans-serif" font-size="28" font-weight="700" fill="#2ee6a6">IA • Prove • Piano Casa 2026</text>
